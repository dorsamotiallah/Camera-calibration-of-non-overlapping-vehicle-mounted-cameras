%YAML:1.0

# FinnForest S01 summer camera C1 (serial 22573022), monocular.
# This config loads the atlas file c1_atlasCamera 1.osa from the NMC3D repo root.
System.LoadAtlasFromFile: "c1_atlas"
# System.SaveAtlasToFile: "c1_atlas"

#--------------------------------------------------------------------------------------------
# Camera Parameters
#--------------------------------------------------------------------------------------------
File.version: "1.0"

Camera.type: "PinHole"

# Camera calibration and distortion parameters (OpenCV)
Camera1.fx: 1056.004362421677
Camera1.fy: 1056.6107466782373
Camera1.cx: 965.1370274314718
Camera1.cy: 592.8614373141475

# Distortion parameters
Camera1.k1: -0.12339460575603058
Camera1.k2: 0.08276278273504381
Camera1.p1: 0.0
Camera1.p2: 0.0
Camera1.k3: -0.022386636348482834

# Camera resolution
Camera.width: 1920
Camera.height: 1200

# Camera frames per second
Camera.fps: 40

# Color order of the images (0: BGR, 1: RGB. It is ignored if images are grayscale)
Camera.RGB: 1

#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------
ORBextractor.nFeatures: 5000
ORBextractor.scaleFactor: 1.15
ORBextractor.nLevels: 8
ORBextractor.iniThFAST: 4
ORBextractor.minThFAST: 2

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -3.5
Viewer.ViewpointF: 500.0
