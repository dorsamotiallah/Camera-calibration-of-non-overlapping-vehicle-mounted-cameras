%YAML:1.0

# Agilex PNG-folder calibration config. The run scripts generate per-run camera
# configs that load atlases from the selected result folder.
Mode: calib

UseViewer: 0

Camera1.Type: 0
Camera1.Image: "/cam_front/image"

Camera2.Type: 0
Camera2.Image: "/cam_back/image"

Calibration.UseMetricScale: 0
Calibration.FixScaleAfterMetric: 0
Calibration.UseMetricScalePrior: 0
Calibration.MetricScalePriorWeight: 0.0
Camera1.MetricScale: 1.0
Camera2.MetricScale: 1.0
