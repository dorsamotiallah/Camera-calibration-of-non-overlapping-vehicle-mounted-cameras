%YAML:1.0

# FinnForest C1/C4 monocular SLAM config for controlled ROS bag playback.
# This keeps the normal rosbag-play workflow separate from the ACK-driven one.

# slam or calib
Mode: slam

# 0 disables Pangolin/OpenCV viewers during atlas building. This keeps the
# SLAM/calibration logic unchanged but removes GUI overhead.
UseViewer: 0

# Controlled playback ACKs. The controlled player waits for these topics before
# publishing too far ahead, so ORB-SLAM processing controls replay pace.
PlaybackAck.Enabled: 1
PlaybackAck.TopicPrefix: "/orbcalib"
PlaybackAck.LogEvery: 100

# 0 for mono
# 1 for stereo
# 2 for rgbd
Camera1.Type: 0
Camera1.Image: "/cam_c1/image"

Camera2.Type: 0
Camera2.Image: "/cam_c4/image"
